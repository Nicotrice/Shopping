<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lidl Monthly Shop</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --surface: #1a1a22;
    --surface2: #22222e;
    --border: #2e2e3e;
    --text: #e8e8f0;
    --muted: #7a7a9a;
    --freezer: #38bdf8;
    --cupboard: #4ade80;
    --household: #c084fc;
    --weekly: #fb923c;
    --done-text: #3a3a4a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
  header h1 { font-size: 18px; font-weight: 700; }
  header p { font-size: 12px; color: var(--muted); margin-bottom: 10px; }

  .new-shop-btn {
    background: var(--weekly); color: #0f0f13;
    border: none; border-radius: 8px; padding: 8px 14px;
    font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; -webkit-tap-highlight-color: transparent; white-space: nowrap;
  }
  .new-shop-btn:disabled { opacity: 0.5; }

  .progress-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--freezer), var(--cupboard), var(--household), var(--weekly));
    border-radius: 2px; transition: width 0.4s ease; width: 0%;
  }
  .progress-label { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

  .totals-strip {
    display: flex; gap: 8px; padding: 10px 16px;
    background: var(--surface2); border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
  }
  .totals-strip::-webkit-scrollbar { display: none; }
  .total-chip {
    flex-shrink: 0; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 5px 12px; font-size: 12px;
    font-family: 'DM Mono', monospace; white-space: nowrap;
  }
  .total-chip span { color: var(--muted); margin-right: 4px; }

  .state-msg {
    text-align: center; padding: 60px 20px;
    color: var(--muted); font-size: 14px;
  }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--border);
    border-top-color: var(--freezer); border-radius: 50%;
    animation: spin 0.8s linear infinite; margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .section { margin: 16px 16px 0; }

  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; background: var(--surface);
    border-radius: 12px 12px 0 0; border: 1px solid var(--border);
    border-bottom: none; cursor: pointer; user-select: none;
  }
  .section-header .icon { font-size: 18px; }
  .section-header .title { font-size: 14px; font-weight: 700; flex: 1; }
  .section-header .section-total { font-family: 'DM Mono', monospace; font-size: 13px; }
  .section-header .chevron { font-size: 12px; color: var(--muted); transition: transform 0.2s; }
  .section-header.collapsed .chevron { transform: rotate(-90deg); }

  .section-body { border: 1px solid var(--border); border-top: none; border-radius: 0 0 12px 12px; overflow: hidden; }
  .section-body.hidden { display: none; }

  .item {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 14px; border-bottom: 1px solid var(--border);
    transition: background 0.15s; -webkit-tap-highlight-color: transparent;
  }
  .item:last-child { border-bottom: none; }
  .item.done { background: #15151c; }
  .item.done .item-name { text-decoration: line-through; color: var(--done-text); }
  .item.done .item-sub, .item.done .item-price { color: var(--done-text); }
  .item.done .qty-btn, .item.done .qty-value { color: var(--done-text); border-color: var(--done-text); }

  .checkbox {
    width: 22px; height: 22px; border-radius: 6px;
    border: 2px solid var(--border); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; font-size: 12px; cursor: pointer;
  }
  .item.done .checkbox { border-color: transparent; color: #0f0f13; }

  .item-info { flex: 1; min-width: 0; cursor: pointer; }
  .item-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-sub { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
  .item-price { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); }

  .qty-control { display: flex; align-items: center; gap: 5px; }
  .qty-btn {
    width: 28px; height: 28px; border-radius: 7px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent; transition: background 0.15s;
  }
  .qty-btn:active { background: var(--border); }
  .qty-value { font-family: 'DM Mono', monospace; font-size: 15px; font-weight: 600; min-width: 24px; text-align: center; }

  .grand-total {
    margin: 16px 16px 0; padding: 16px; background: var(--surface);
    border: 1px solid var(--border); border-radius: 12px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .grand-total .label { font-size: 14px; font-weight: 700; }
  .grand-total .label small { display: block; font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
  .grand-total .amount { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 20px;
    font-size: 13px; color: var(--text);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
    white-space: nowrap; z-index: 999;
  }
  .toast.show { opacity: 1; }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; margin: 20px; max-width: 340px; width: 100%;
  }
  .modal h2 { font-size: 16px; font-weight: 700; margin-bottom: 8px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.5; }
  .modal-btns { display: flex; gap: 10px; }
  .modal-btns button {
    flex: 1; padding: 12px; border-radius: 10px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer;
  }
  .btn-cancel { background: var(--surface2); color: var(--muted); }
  .btn-confirm { background: var(--weekly); color: #0f0f13; }

  [data-cat="Freezer"] .checkbox.checked { background: var(--freezer); border-color: var(--freezer); }
  [data-cat="Freezer"] .section-header { border-top: 3px solid var(--freezer); }
  [data-cat="Freezer"] .section-header .section-total { color: var(--freezer); }
  [data-cat="Cupboard"] .checkbox.checked { background: var(--cupboard); border-color: var(--cupboard); }
  [data-cat="Cupboard"] .section-header { border-top: 3px solid var(--cupboard); }
  [data-cat="Cupboard"] .section-header .section-total { color: var(--cupboard); }
  [data-cat="Household"] .checkbox.checked { background: var(--household); border-color: var(--household); }
  [data-cat="Household"] .section-header { border-top: 3px solid var(--household); }
  [data-cat="Household"] .section-header .section-total { color: var(--household); }
  [data-cat="Weekly"] .checkbox.checked { background: var(--weekly); border-color: var(--weekly); }
  [data-cat="Weekly"] .section-header { border-top: 3px solid var(--weekly); }
  [data-cat="Weekly"] .section-header .section-total { color: var(--weekly); }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div>
      <h1>🛒 Lidl Monthly Shop</h1>
      <p>Tap item to check off · +/− to adjust qty</p>
    </div>
    <a href="/manage" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 12px;font-size:16px;text-decoration:none;-webkit-tap-highlight-color:transparent;">⚙️</a>
    <button class="new-shop-btn" onclick="confirmNewShop()">🔄 New Shop</button>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  <div class="progress-label" id="progressLabel">Loading...</div>
</header>

<div class="totals-strip" id="totalsStrip">
  <div class="total-chip"><span>Loading...</span></div>
</div>

<div class="grand-total">
  <div class="label">Monthly Total</div>
  <div class="amount" id="grandTotal">—</div>
</div>

<div id="lists"></div>
<div class="toast" id="toast"></div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>🔄 Start New Shop?</h2>
    <p>This will log all ticked items as purchased, reset quantities to defaults, and clear all ticks.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="executeNewShop()">Start New Shop</button>
    </div>
  </div>
</div>

<script>
const API_URL = '/.netlify/functions/fibery';
const CAT_ICONS = { Freezer: '🧊', Cupboard: '🥫', Household: '🧹', Weekly: '🛒' };
const CAT_ORDER = ['Freezer', 'Cupboard', 'Household', 'Weekly'];
let items = [];

async function fibery(query, variables = {}) {
  const res = await fetch(API_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query, variables })
  });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const json = await res.json();
  if (json.errors) throw new Error(json.errors[0].message);
  return json.data;
}

async function loadItems() {
  document.getElementById('lists').innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading your shopping list...</div>';
  try {
    const data = await fibery(`{
      findShoppingItems(active: { is: true }, orderBy: { itemName: ASC }) {
        id
        itemName
        unitPrice
        defaultQuantity
        currentQuantity
        shopped
        category { name }
      }
    }`);
    items = data.findShoppingItems.map(i => ({
      id: i.id,
      name: i.itemName,
      price: i.unitPrice || 0,
      defaultQty: i.defaultQuantity || 1,
      currentQty: i.currentQuantity != null ? i.currentQuantity : (i.defaultQuantity || 1),
      shopped: i.shopped || false,
      category: i.category?.name || 'Other'
    }));
    render();
  } catch(e) {
    document.getElementById('lists').innerHTML = `
      <div class="state-msg">
        ❌ Failed to load: ${e.message}<br><br>
        <button onclick="loadItems()" style="color:var(--weekly);background:none;border:none;cursor:pointer;font-size:14px;">Retry</button>
      </div>`;
  }
}

function render() {
  const lists = document.getElementById('lists');
  lists.innerHTML = '';
  const grouped = {};
  CAT_ORDER.forEach(c => grouped[c] = []);
  items.forEach(item => {
    if (!grouped[item.category]) grouped[item.category] = [];
    grouped[item.category].push(item);
  });

  const strip = document.getElementById('totalsStrip');
  strip.innerHTML = '';
  let grandTotal = 0;

  CAT_ORDER.forEach(cat => {
    const catItems = grouped[cat];
    if (!catItems || catItems.length === 0) return;

    const catTotal = catItems.reduce((s, i) => s + (i.price * i.currentQty), 0);
    grandTotal += catTotal;

    const chip = document.createElement('div');
    chip.className = 'total-chip';
    chip.innerHTML = `<span>${CAT_ICONS[cat] || '📦'}</span>£${catTotal.toFixed(2)}`;
    strip.appendChild(chip);

    const section = document.createElement('div');
    section.className = 'section';
    section.dataset.cat = cat;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <span class="icon">${CAT_ICONS[cat] || '📦'}</span>
      <span class="title">${cat}</span>
      <span class="section-total">£${catTotal.toFixed(2)}</span>
      <span class="chevron">▾</span>`;
    header.onclick = () => {
      header.classList.toggle('collapsed');
      body.classList.toggle('hidden');
    };

    const body = document.createElement('div');
    body.className = 'section-body';

    catItems.forEach(item => {
      const row = document.createElement('div');
      row.className = 'item' + (item.shopped ? ' done' : '');

      const cb = document.createElement('div');
      cb.className = 'checkbox' + (item.shopped ? ' checked' : '');
      cb.textContent = item.shopped ? '✓' : '';
      cb.onclick = () => toggleShopped(item);

      const info = document.createElement('div');
      info.className = 'item-info';
      info.innerHTML = `<div class="item-name">${item.name}</div><div class="item-sub">£${item.price.toFixed(2)} each</div>`;
      info.onclick = () => toggleShopped(item);

      const right = document.createElement('div');
      right.className = 'item-right';

      const qtyCtrl = document.createElement('div');
      qtyCtrl.className = 'qty-control';

      const minus = document.createElement('button');
      minus.className = 'qty-btn';
      minus.textContent = '−';
      minus.onclick = (e) => { e.stopPropagation(); changeQty(item, -1); };

      const qtyVal = document.createElement('div');
      qtyVal.className = 'qty-value';
      qtyVal.textContent = item.currentQty;

      const plus = document.createElement('button');
      plus.className = 'qty-btn';
      plus.textContent = '+';
      plus.onclick = (e) => { e.stopPropagation(); changeQty(item, 1); };

      const price = document.createElement('div');
      price.className = 'item-price';
      price.textContent = '£' + (item.price * item.currentQty).toFixed(2);

      qtyCtrl.append(minus, qtyVal, plus);
      right.append(qtyCtrl, price);
      row.append(cb, info, right);
      body.appendChild(row);
    });

    section.append(header, body);
    lists.appendChild(section);
  });

  const grandChip = document.createElement('div');
  grandChip.className = 'total-chip';
  grandChip.innerHTML = `<span>Total</span>£${grandTotal.toFixed(2)}`;
  strip.appendChild(grandChip);

  document.getElementById('grandTotal').textContent = '£' + grandTotal.toFixed(2);
  updateProgress();
}

function updateProgress() {
  const total = items.length;
  const done = items.filter(i => i.shopped).length;
  const pct = total ? (done / total) * 100 : 0;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = `${done} of ${total} items done`;
}

const qtyTimers = {};

async function toggleShopped(item) {
  item.shopped = !item.shopped;
  render();
  try {
    await fibery(`
      mutation {
        shoppingItems(id: { is: "${item.id}" }) {
          update(shopped: ${item.shopped}) { message }
        }
      }
    `);
  } catch(e) {
    item.shopped = !item.shopped;
    render();
    showToast('❌ Failed to update — check connection');
  }
}

async function changeQty(item, delta) {
  item.currentQty = Math.max(0, item.currentQty + delta);
  render();
  clearTimeout(qtyTimers[item.id]);
  qtyTimers[item.id] = setTimeout(async () => {
    try {
      await fibery(`
        mutation {
          shoppingItems(id: { is: "${item.id}" }) {
            update(currentQuantity: ${item.currentQty}) { message }
          }
        }
      `);
      showToast('✓ Quantity saved');
    } catch(e) {
      showToast('❌ Failed to save quantity');
    }
  }, 800);
}

function confirmNewShop() {
  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

async function executeNewShop() {
  closeModal();
  showToast('⏳ Starting new shop...');
  const shoppedItems = items.filter(i => i.shopped);
  try {
    // Create a Purchased record for each shopped item
    for (const item of shoppedItems) {
      await fibery(`
        mutation {
          purchaseds {
            create(shoppingItem: { id: { is: "${item.id}" } }) {
              message
            }
          }
        }
      `);
    }

    // Reset all items: shopped = false, currentQuantity = defaultQuantity
    for (const item of items) {
      await fibery(`
        mutation {
          shoppingItems(id: { is: "${item.id}" }) {
            update(shopped: false, currentQuantity: ${item.defaultQty}) { message }
          }
        }
      `);
      item.shopped = false;
      item.currentQty = item.defaultQty;
    }

    showToast(`✓ New shop started — ${shoppedItems.length} purchases logged`);
    render();
  } catch(e) {
    showToast('❌ Error: ' + e.message);
  }
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

loadItems();
</script>
</body>
</html>
